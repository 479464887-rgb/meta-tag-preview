<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="Meta Tag Preview — DevKit Tools">
    <meta property="og:description" content="Preview how your website appears on Google, Twitter, and Facebook. Optimize OG tags and SEO.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <title>Meta Tag Preview — DevKit Tools</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --success: #3fb950;
            --danger: #f85149;
            --radius: 6px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header a { color: var(--text); text-decoration: none; font-weight: 600; font-size: 16px; }
        .header a:hover { color: var(--accent); }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 24px;
            flex: 1;
            width: 100%;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #f0f6fc;
        }
        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 16px;
        }
        .card h2 {
            font-size: 16px;
            margin-bottom: 16px;
            color: #f0f6fc;
        }
        textarea, input[type="text"], input[type="number"], select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
            color: var(--text);
            font-size: 14px;
            font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
            resize: vertical;
            transition: border-color 0.15s;
        }
        textarea:focus, input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }
        button {
            background: #238636;
            color: #fff;
            border: 1px solid rgba(240, 246, 252, 0.1);
            border-radius: var(--radius);
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }
        button:hover { background: #2ea043; }
        button.secondary {
            background: var(--surface);
            border: 1px solid var(--border);
        }
        button.secondary:hover { background: #30363d; }
        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }
        .feature-tag {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .output {
            margin-top: 16px;
            word-break: break-all;
        }
        .footer {
            text-align: center;
            padding: 24px;
            color: var(--text-secondary);
            font-size: 12px;
            border-top: 1px solid var(--border);
        }
        .footer a { color: var(--accent); text-decoration: none; }
        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .copied { color: var(--success); font-size: 12px; margin-left: 8px; opacity: 0; transition: opacity 0.3s; }
        .copied.show { opacity: 1; }
        .label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
        }
/* 响应式设计 */
@media (max-width: 768px) {
  body { padding: 12px; }
  header { padding: 12px 16px; flex-direction: column; }
  .container { max-width: 100%; padding: 0 8px; }
  h1 { font-size: 1.5rem; }
  textarea, input, select, button { width: 100%; }
  .grid { grid-template-columns: 1fr; }
  .card { padding: 12px; }
}    </style>
</head>
<body>
    <div class="header">
        <a href="https://479464887-rgb.github.io/devkit-site/">← DevKit Tools</a>
        <span style="color:var(--text-secondary);font-size:13px">Meta Tag Preview</span>
    </div>
    <div class="container">
        <h1>Meta Tag Preview</h1>
        <p class="subtitle">Preview how your website appears on Google, Twitter, and Facebook. Optimize OG tags and SEO.</p>
        <div class="features">
            <span class="feature-tag">Google search preview</span>
            <span class="feature-tag">Twitter card preview</span>
            <span class="feature-tag">Facebook OG preview</span>
            <span class="feature-tag">Copy meta tags</span>
        </div>
        <div class="card">
            <h2>Tool</h2>
            <div id="tool-area">
                
<label class="label">Page Title</label>
<input type="text" id="mt-title" value="My Awesome Page" style="margin-bottom:8px;">
<label class="label">Description</label>
<textarea id="mt-desc" rows="2" style="margin-bottom:8px;">A detailed description of my awesome page for search engines and social media.</textarea>
<label class="label">URL</label>
<input type="text" id="mt-url" value="https://example.com/page" style="margin-bottom:8px;">
<label class="label">Site Name</label>
<input type="text" id="mt-site" value="Example Site" style="margin-bottom:8px;">
<label class="label">OG Image URL</label>
<input type="text" id="mt-image" value="" placeholder="https://example.com/og-image.jpg" style="margin-bottom:16px;">

<div style="display:flex;gap:16px;flex-wrap:wrap;">
    <div style="flex:1;min-width:280px;">
        <div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;">🔍 Google Search</div>
        <div id="google-preview" style="max-width:400px;"></div>
    </div>
    <div style="flex:1;min-width:280px;">
        <div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;">🐦 Twitter Card</div>
        <div id="twitter-preview"></div>
    </div>
</div>

<label class="label" style="margin-top:16px;">Meta Tags Code</label>
<textarea id="meta-code" rows="10" readonly></textarea>
<button id="copy-meta" style="margin-top:8px;">Copy Meta Tags</button>

            <script>

const title = document.getElementById('mt-title');
const desc = document.getElementById('mt-desc');
const url = document.getElementById('mt-url');
const site = document.getElementById('mt-site');
const image = document.getElementById('mt-image');

function update() {
    const t = title.value || 'Page Title';
    const d = desc.value || 'Page description goes here...';
    const u = url.value || 'https://example.com/page';
    const s = site.value || 'Example Site';
    const img = image.value || '';
    
    // Google
    document.getElementById('google-preview').innerHTML = `
        <div style="font-size:20px;color:#1a0dab;line-height:1.3;margin-bottom:4px;">${t.substring(0,60)}</div>
        <div style="font-size:14px;color:#006621;line-height:1.4;">${u.substring(0,70)}</div>
        <div style="font-size:14px;color:#545454;line-height:1.4;">${d.substring(0,160)}</div>
    `;
    
    // Twitter
    document.getElementById('twitter-preview').innerHTML = `
        <div style="border:1px solid #38444d;border-radius:12px;overflow:hidden;max-width:400px;">
            ${img ? `<img src="${img}" style="width:100%;height:200px;object-fit:cover;">` : `<div style="width:100%;height:200px;background:#1a1a2e;display:flex;align-items:center;justify-content:center;color:#666;">No Image</div>`}
            <div style="padding:12px;">
                <div style="font-size:12px;color:#8899a6;">${u.substring(0,40)}</div>
                <div style="font-size:15px;color:#fff;font-weight:500;margin:4px 0;">${t.substring(0,50)}</div>
                <div style="font-size:13px;color:#8899a6;">${d.substring(0,100)}</div>
            </div>
        </div>
    `;
    
    // Code
    document.getElementById('meta-code').value = 
`<title>${t}</title>
<meta name="description" content="${d}">
<meta property="og:title" content="${t}">
<meta property="og:description" content="${d}">
<meta property="og:url" content="${u}">
<meta property="og:site_name" content="${s}">
<meta property="og:type" content="website">
${img ? `<meta property="og:image" content="${img}">` : ''}
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="${t}">
<meta name="twitter:description" content="${d}">
${img ? `<meta name="twitter:image" content="${img}">` : ''}`;
}

[title, desc, url, site, image].forEach(el => el.addEventListener('input', update));
document.getElementById('copy-meta').addEventListener('click', () => {
    navigator.clipboard.writeText(document.getElementById('meta-code').value);
    const b = document.getElementById('copy-meta'); b.textContent='Copied!'; setTimeout(()=>b.textContent='Copy Meta Tags',1500);
});
update();

            </script>
            </div>
        </div>
    </div>
    <div class="footer">
        <a href="https://479464887-rgb.github.io/devkit-site/privacy.html">Privacy</a> ·
        <a href="https://479464887-rgb.github.io/devkit-site/terms.html">Terms</a> ·
        © 2026 DevKit Tools
    </div>
    <script>
    function copyText(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            var orig = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = orig, 1500);
        });
    }
    </script>
</body>
</html>
